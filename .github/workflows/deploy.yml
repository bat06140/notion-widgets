name: Build & Deploy widget-server

on:
  push:
    branches: [main]
    paths:
      - 'apps/widget-server/**'
      - 'apps/widget-client/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Force les actions tierces a utiliser Node 24
      # au lieu de Node 20 (deprecie depuis 2026-09-16)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        # turbo orchestre dans l'ordre : @repo/shared -> widget-client + widget-server
        # Produit :
        #   apps/widget-server/dist/  <- server TypeScript compile
        #   apps/widget-client/dist/  <- Vite bundle (servi par Express)
        run: npm run build

      - name: Get runner public IP
        id: ip
        uses: haythem/public-ip@v1.3

      - name: Whitelist runner IP
        run: |
          curl -sm 45 \
            -H 'Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}' \
            'https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/add?address=${{ steps.ip.outputs.ipv4 }}&port=22'

      - name: Verify IP is whitelisted
        run: |
          curl -sm 45 \
            -H 'Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}' \
            'https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/list' \
          | grep '${{ steps.ip.outputs.ipv4 }}'

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 0400 ~/.ssh/id_rsa

      - name: Sync source code to server
        run: |
          # On synchronise tout le code source (sauf node_modules et dist)
          rsync --timeout=60 \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" \
            -av --delete \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".turbo" \
            ./ \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_SERVER }}:/home/${{ secrets.CPANEL_USERNAME }}/repositories/notion-widgets/

      - name: Install, Build and Restart on server
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_SERVER }} \
            "cd ~/repositories/notion-widgets && \
             npm ci && \
             npm run build && \
             rm -rf apps/widget-server/node_modules && \
             mkdir -p tmp apps/widget-server/tmp && \
             touch tmp/restart.txt apps/widget-server/tmp/restart.txt && \
             ls -l tmp/restart.txt apps/widget-server/tmp/restart.txt"

      - name: Cleanup SSH key
        if: always()
        run: rm -fr ~/.ssh

      - name: Remove runner IP from whitelist
        if: always() && steps.ip.outputs.ipv4 != ''
        run: |
          set -euo pipefail

          remove_whitelist_entry() {
            local direction="$1"
            local response

            response=$(curl -sm 45 \
              -H 'Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}' \
              'https://${{ secrets.CPANEL_SERVER }}:2083/execute/SshWhitelist/remove?address=${{ steps.ip.outputs.ipv4 }}&port=22&direction='"${direction}")

            echo "$response"

            echo "$response" | jq -e \
              '.status == 1 or ((.errors // []) | join(" ") | contains("existe pas"))' \
              >/dev/null
          }

          remove_whitelist_entry in
          remove_whitelist_entry out
